<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        #grade1{
            width: 80%;
            height: 300px;
            background: linear-gradient(to right, red, yellow);
            margin-bottom: 20px;
        }
        #grade2{
            width: 80%;
            height: 300px;
            background: radial-gradient(circle, red, yellow, green);
            margin-bottom: 20px;
        }
        #grade3{
            width: 80%;
            height: 100px;
            background: repeating-linear-gradient(45deg, red, yellow 18px, green, blue 20px);
        }
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Gradients in HTML</h1>
    <div id="grade1">Gradient Example</div>
    <div id="grade2"></div>
    <div id="grade3"></div>
</body>
</html>
